<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小雞手抄</title>
    <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
    <style>
        :root { --chick: #ffde59; --ink: #2c2c2c; --font: 'Zhi Mang Xing', cursive; }
        body { background: #fdfaf5; color: var(--ink); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: var(--chick); width: 100%; padding: 40px 0; text-align: center; border-bottom: 5px solid var(--ink); }
        
        /* 這裡強制讓所有標題變書法體 */
        .main-title, h2 { font-family: var(--font) !important; }
        .main-title { font-size: 5.5rem; margin: 0; }
        
        .container { max-width: 480px; width: 92%; margin-top: 20px; }
        .card { background: white; border: 3px solid var(--ink); border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 6px 6px 0 var(--ink); }
        h2 { font-size: 2.5rem; margin: 0 0 10px 0; border-bottom: 3px solid var(--chick); display: inline-block; }
        
        #chat-box { height: 250px; overflow-y: auto; border: 2px solid #ddd; border-radius: 10px; padding: 10px; background: #fff; margin-bottom: 10px; display: flex; flex-direction: column; }
        .chat-msg { margin-bottom: 8px; padding: 8px 12px; border-radius: 12px; max-width: 85%; font-size: 0.95rem; }
        .msg-me { background: var(--chick); align-self: flex-end; }
        .msg-other { background: #eee; align-self: flex-start; }
        
        .btn { background: var(--ink); color: white; padding: 15px; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1.2rem; }
        #profile-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 99; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 85%; text-align: center; border: 4px solid var(--ink); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<header><div class="main-title">小雞手抄</div></header>

<div class="container">
    <div id="status-bar" style="text-align:right; margin-bottom:10px; font-weight:bold;">等待登入...</div>
    
    <button id="login-btn" class="btn" style="background:white; color:var(--ink); border:3px solid var(--ink); margin-bottom:20px;">👤 點我 Google 登入</button>
    <button id="logout-btn" class="btn" style="display:none; background:#ff4d4d; margin-bottom:20px;">登出</button>

    <section class="card">
        <h2>和小雞聊天</h2>
        <div id="chat-box"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="chat-input" placeholder="說點什麼吧...">
            <button id="send-btn" style="background:var(--ink); color:white; border:none; padding:0 15px; border-radius:8px;">發送</button>
        </div>
    </section>
</div>

<div id="profile-modal">
    <div class="modal-content">
        <h2>填寫資料</h2>
        <input type="text" id="p-nickname" placeholder="暱稱">
        <input type="text" id="p-ig" placeholder="IG 帳號">
        <button class="btn" id="save-profile-btn">儲存</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAOnZ6ZHMPS2S3-4C22IQetiIlSGV-OaEU",
        authDomain: "chicken-39494.firebaseapp.com",
        projectId: "chicken-39494",
        storageBucket: "chicken-39494.firebasestorage.app",
        messagingSenderId: "206297835176",
        appId: "1:206297835176:web:9d892561a92803f694049d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore();
    const provider = new GoogleAuthProvider();

    let userProfile = null;

    // 點擊後會直接轉跳到 Google 登入頁面，這能避開所有彈窗被擋的問題
    document.getElementById('login-btn').onclick = () => signInWithRedirect(auth, provider);
    document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.reload());

    // 處理登入轉跳回來後的結果
    getRedirectResult(auth).catch(e => console.error("Redirect Error", e));

    onAuthStateChanged(auth, async (user) => {
        const statusBar = document.getElementById('status-bar');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');

        if (user) {
            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists()) {
                userProfile = snap.data();
                statusBar.innerText = "👋 " + userProfile.nickname;
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'block';
                loadChat();
            } else {
                document.getElementById('profile-modal').style.display = 'flex';
            }
        }
    });

    document.getElementById('save-profile-btn').onclick = async () => {
        const nickname = document.getElementById('p-nickname').value;
        const ig = document.getElementById('p-ig').value;
        if(nickname && ig) {
            await setDoc(doc(db, "users", auth.currentUser.uid), { nickname, ig, email: auth.currentUser.email });
            location.reload();
        }
    };

    document.getElementById('send-btn').onclick = async () => {
        const text = document.getElementById('chat-input').value;
        if (userProfile && text) {
            await addDoc(collection(db, "chats"), { nickname: userProfile.nickname, text, timestamp: Date.now(), uid: auth.currentUser.uid });
            document.getElementById('chat-input').value = "";
        }
    };

    function loadChat() {
        onSnapshot(query(collection(db, "chats"), orderBy("timestamp", "asc"), limit(30)), (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                const div = document.createElement('div');
                div.className = `chat-msg ${auth.currentUser && m.uid === auth.currentUser.uid ? 'msg-me' : 'msg-other'}`;
                div.innerHTML = `<small style="display:block; font-size:0.7rem; opacity:0.6;">${m.nickname}</small>${m.text}`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>
