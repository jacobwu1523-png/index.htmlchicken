<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小雞手抄 | 互動平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --chick: #ffde59; --ink: #2c2c2c; --paper: #fdfaf5; --font: 'Zhi Mang Xing', cursive; }
        body { background: var(--paper); color: var(--ink); font-family: 'Noto Sans TC', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: var(--chick); width: 100%; padding: 30px 0; text-align: center; border-bottom: 5px solid var(--ink); }
        .main-title { font-family: var(--font) !important; font-size: 5rem; margin: 0; }
        .container { max-width: 500px; width: 92%; margin-top: 20px; }
        .card { background: white; border: 3px solid var(--ink); border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 6px 6px 0 var(--ink); }
        h2 { font-family: var(--font) !important; font-size: 2.5rem; margin: 0 0 10px 0; border-bottom: 3px solid var(--chick); display: inline-block; }
        #chat-box { height: 250px; overflow-y: auto; border: 2px solid #ddd; border-radius: 10px; padding: 10px; background: #fff; display: flex; flex-direction: column; margin-bottom: 10px; }
        .chat-msg { margin-bottom: 8px; padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 0.95rem; line-height: 1.4; }
        .msg-me { background: var(--chick); align-self: flex-end; }
        .msg-other { background: #eee; align-self: flex-start; }
        .btn { background: var(--ink); color: white; padding: 15px; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1.1rem; }
        #profile-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 99; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 80%; max-width: 350px; text-align: center; border: 4px solid var(--ink); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<header><div class="main-title">小雞手抄</div></header>

<div class="container">
    <div id="status-bar" style="text-align:right; margin-bottom:10px; font-weight:bold;">系統檢查中...</div>
    
    <button id="login-btn" class="btn" style="background:white; color:var(--ink); border:3px solid var(--ink); margin-bottom:20px;">👤 點我 Google 登入</button>
    <button id="logout-btn" class="btn" style="display:none; background:#ff4d4d; margin-bottom:20px;">登出帳號</button>

    <section class="card">
        <h2>墨友排行</h2>
        <div id="leaderboard">登入後解鎖排行...</div>
    </section>

    <section class="card">
        <h2>和小雞聊天</h2>
        <div id="chat-box"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="chat-input" placeholder="說點什麼吧...">
            <button id="send-btn" style="background:var(--ink); color:white; border:none; padding:0 15px; border-radius:8px; cursor:pointer;">發送</button>
        </div>
    </section>
</div>

<div id="profile-modal">
    <div class="modal-content">
        <h2 style="font-size:2rem;">初次見面！</h2>
        <input type="text" id="p-nickname" placeholder="想被叫什麼名字？">
        <input type="text" id="p-ig" placeholder="你的 IG 帳號">
        <button class="btn" id="save-profile-btn">儲存並進入</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAOnZ6ZHMPS2S3-4C22IQetiIlSGV-OaEU",
        authDomain: "chicken-39494.firebaseapp.com",
        projectId: "chicken-39494",
        storageBucket: "chicken-39494.firebasestorage.app",
        messagingSenderId: "206297835176",
        appId: "1:206297835176:web:9d892561a92803f694049d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore();
    const provider = new GoogleAuthProvider();

    let userProfile = null;

    // 直接綁定按鈕
    document.getElementById('login-btn').onclick = () => {
        signInWithPopup(auth, provider).catch(e => alert("登入失敗！請檢查 Firebase 授權網域設定。\n錯誤訊息：" + e.message));
    };

    document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.reload());

    onAuthStateChanged(auth, async (user) => {
        const statusBar = document.getElementById('status-bar');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');

        if (user) {
            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists()) {
                userProfile = snap.data();
                statusBar.innerText = "👋 " + userProfile.nickname;
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'block';
                loadData();
            } else {
                document.getElementById('profile-modal').style.display = 'flex';
            }
        } else {
            statusBar.innerText = "尚未登入";
            loginBtn.style.display = 'block';
            logoutBtn.style.display = 'none';
        }
    });

    document.getElementById('save-profile-btn').onclick = async () => {
        const nickname = document.getElementById('p-nickname').value;
        const ig = document.getElementById('p-ig').value;
        if(!nickname || !ig) return alert("要填完喔！");
        await setDoc(doc(db, "users", auth.currentUser.uid), { nickname, ig, email: auth.currentUser.email });
        location.reload();
    };

    document.getElementById('send-btn').onclick = async () => {
        const text = document.getElementById('chat-input').value;
        if (!userProfile || !text) return alert("請先登入！");
        await addDoc(collection(db, "chats"), { 
            nickname: userProfile.nickname, 
            text, 
            timestamp: Date.now(), 
            uid: auth.currentUser.uid 
        });
        document.getElementById('chat-input').value = "";
    };

    function loadData() {
        onSnapshot(query(collection(db, "chats"), orderBy("timestamp", "asc"), limit(30)), (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                const div = document.createElement('div');
                div.className = `chat-msg ${auth.currentUser && m.uid === auth.currentUser.uid ? 'msg-me' : 'msg-other'}`;
                div.innerHTML = `<small style="display:block; font-size:0.7rem; opacity:0.6;">${m.nickname}</small>${m.text}`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });

        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('leaderboard');
            list.innerHTML = "";
            snap.forEach(d => {
                const u = d.data();
                const div = document.createElement('div');
                div.style.padding = "10px";
                div.style.borderBottom = "1px solid #eee";
                div.innerHTML = `<strong>${u.nickname}</strong> <small style="color:#888">${u.ig}</small>`;
                list.appendChild(div);
            });
        });
    }
</script>
</body>
</html>
