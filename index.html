<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小雞手抄 | 互動平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
    <style>
        :root { --chick: #ffde59; --ink: #2c2c2c; --paper: #fdfaf5; --font: 'Zhi Mang Xing', cursive; }
        body { background: var(--paper); color: var(--ink); font-family: sans-serif; margin: 0; padding-bottom: 50px; display: flex; flex-direction: column; align-items: center; }
        header { background: var(--chick); width: 100%; padding: 40px 0; text-align: center; border-bottom: 5px solid var(--ink); margin-bottom: 20px; }
        .main-title { font-family: var(--font) !important; font-size: 5.5rem; margin: 0; }
        .container { max-width: 480px; width: 92%; }
        .card { background: white; border: 3px solid var(--ink); border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 6px 6px 0 var(--ink); }
        h2 { font-family: var(--font) !important; font-size: 2.5rem; margin: 0 0 10px 0; border-bottom: 3px solid var(--chick); display: inline-block; font-weight: normal; }
        #chat-box { height: 250px; overflow-y: auto; border: 2px solid #ddd; border-radius: 10px; padding: 10px; background: #fff; margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 10px; max-width: 85%; }
        .msg-me { background: var(--chick); align-self: flex-end; }
        .msg-other { background: #eee; align-self: flex-start; }
        .btn { background: var(--ink); color: white; padding: 15px; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1.2rem; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
        .modal-body { background: white; padding: 25px; border-radius: 15px; width: 85%; border: 4px solid var(--ink); text-align: center; }
    </style>
</head>
<body>

<header><div class="main-title">小雞手抄</div></header>

<div class="container">
    <div id="user-info" style="text-align:right; margin-bottom:10px; font-weight:bold;">狀態：載入中...</div>
    
    <button id="login-btn" class="btn" style="background:white; color:var(--ink); border:3px solid var(--ink); margin-bottom:20px; display:none;">👤 點我 Google 登入</button>
    <button id="logout-btn" class="btn" style="background:#ff4d4d; margin-bottom:20px; display:none;">登出</button>

    <section class="card">
        <h2>和小雞聊天</h2>
        <div id="chat-box"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="chat-input" placeholder="說點什麼...">
            <button id="send-btn" style="background:var(--ink); color:white; border:none; padding:0 15px; border-radius:8px;">發送</button>
        </div>
    </section>
</div>

<div id="modal">
    <div class="modal-body">
        <h2>歡迎加入</h2>
        <input type="text" id="p-nick" placeholder="你的暱稱" style="margin-bottom:10px;">
        <input type="text" id="p-ig" placeholder="你的 IG">
        <button class="btn" id="save-btn" style="margin-top:15px;">完成</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAOnZ6ZHMPS2S3-4C22IQetiIlSGV-OaEU",
        authDomain: "chicken-39494.firebaseapp.com",
        projectId: "chicken-39494",
        storageBucket: "chicken-39494.firebasestorage.app",
        messagingSenderId: "206297835176",
        appId: "1:206297835176:web:9d892561a92803f694049d"
    };

    // 初始化 Firebase (Version 8 寫法)
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    const info = document.getElementById('user-info');
    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');

    // 登入
    loginBtn.onclick = () => auth.signInWithRedirect(provider);
    logoutBtn.onclick = () => auth.signOut().then(() => location.reload());

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            const doc = await db.collection("users").doc(user.uid).get();
            if (doc.exists) {
                const data = doc.data();
                info.innerText = "👋 " + data.nickname;
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'block';
                startChat(user.uid, data.nickname);
            } else {
                document.getElementById('modal').style.display = 'flex';
            }
        } else {
            info.innerText = "請先登入";
            loginBtn.style.display = 'block';
        }
    });

    document.getElementById('save-btn').onclick = async () => {
        const nickname = document.getElementById('p-nick').value;
        const ig = document.getElementById('p-ig').value;
        if(nickname && ig) {
            await db.collection("users").doc(auth.currentUser.uid).set({ nickname, ig, email: auth.currentUser.email });
            location.reload();
        }
    };

    function startChat(uid, nickname) {
        document.getElementById('send-btn').onclick = async () => {
            const text = document.getElementById('chat-input').value;
            if (text) {
                await db.collection("chats").add({ nickname, text, uid, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                document.getElementById('chat-input').value = "";
            }
        };

        db.collection("chats").orderBy("timestamp", "asc").limitToLast(30).onSnapshot(snap => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                const div = document.createElement('div');
                div.className = `msg ${m.uid === uid ? 'msg-me' : 'msg-other'}`;
                div.innerHTML = `<small style="display:block; font-size:0.6rem; opacity:0.5;">${m.nickname}</small>${m.text}`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>
