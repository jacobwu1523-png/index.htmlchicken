<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小雞手抄 | 互動平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --chick: #ffde59; --ink: #2c2c2c; --paper: #fdfaf5; 
            --calligraphy: 'Zhi Mang Xing', cursive, "標楷體";
        }

        body { background: var(--paper); color: var(--ink); font-family: 'Noto Sans TC', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* 標題字體：加上強制執行 */
        header { background: var(--chick); width: 100%; padding: 40px 0; text-align: center; border-bottom: 5px solid var(--ink); }
        .main-title { 
            font-family: var(--calligraphy) !important; 
            font-size: 5rem !important; 
            margin: 0; 
            color: var(--ink);
        }

        .container { max-width: 500px; width: 92%; margin-top: 20px; }
        .card { background: white; border: 3px solid var(--ink); border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 8px 8px 0 var(--ink); }
        
        h2 { font-family: var(--calligraphy) !important; font-size: 2.5rem; margin: 0 0 15px 0; }

        /* 狀態顯示 */
        #user-nav { background: #eee; padding: 10px; border-radius: 10px; margin-bottom: 15px; text-align: right; border: 1px solid #ccc; font-size: 0.9rem; }

        /* 聊天室 */
        #chat-box { height: 250px; overflow-y: auto; border: 2px solid #ddd; border-radius: 10px; padding: 10px; background: #fff; margin-bottom: 10px; display: flex; flex-direction: column; }
        .chat-msg { margin-bottom: 8px; padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 0.95rem; }
        .msg-other { background: #e0e0e0; align-self: flex-start; }
        .msg-me { background: var(--chick); align-self: flex-end; }

        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { background: var(--ink); color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        
        #profile-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 99; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 80%; max-width: 350px; text-align: center; border: 4px solid var(--ink); }
    </style>
</head>
<body>

<header>
    <div class="main-title">小雞手抄</div>
</header>

<div class="container">
    <div id="user-nav">
        <span id="nav-info">等待系統響應...</span>
        <button id="logout-btn" style="display:none; margin-left:10px;">登出</button>
    </div>

    <section class="card">
        <h2>墨友排行</h2>
        <div id="leaderboard-list">等待登入中...</div>
    </section>

    <section class="card">
        <h2>和小雞聊天</h2>
        <div id="chat-box"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="chat-input" placeholder="說點什麼吧...">
            <button onclick="sendChat()" style="width:60px; background:var(--ink); color:white; border:none; border-radius:5px; cursor:pointer;">發送</button>
        </div>
    </section>

    <button id="login-btn" class="btn" style="background:white; color:var(--ink); border:3px solid var(--ink); display:none;">👤 使用 Google 快速登入</button>
</div>

<div id="profile-modal">
    <div class="modal-content">
        <h2 style="font-size:2rem;">初次見面！</h2>
        <input type="text" id="p-nickname" placeholder="想被叫什麼名字？">
        <input type="text" id="p-ig" placeholder="你的 IG 帳號">
        <button class="btn" onclick="saveProfile()">儲存並進入</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAOnZ6ZHMPS2S3-4C22IQetiIlSGV-OaEU",
        authDomain: "chicken-39494.firebaseapp.com",
        projectId: "chicken-39494",
        storageBucket: "chicken-39494.firebasestorage.app",
        messagingSenderId: "206297835176",
        appId: "1:206297835176:web:9d892561a92803f694049d",
    };

    try {
        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();
        const provider = new GoogleAuthProvider();

        let userProfile = null;

        // 登入功能
        document.getElementById('login-btn').onclick = () => {
            signInWithPopup(auth, provider).catch(e => alert("登入出錯，請檢查 Firebase 授權網域：" + e.message));
        };

        // 登出功能
        document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.reload());

        // 狀態監控
        onAuthStateChanged(auth, async (user) => {
            const navInfo = document.getElementById('nav-info');
            const loginBtn = document.getElementById('login-btn');
            
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    userProfile = snap.data();
                    navInfo.innerText = "👋 " + userProfile.nickname;
                    loginBtn.style.display = 'none';
                    document.getElementById('logout-btn').style.display = 'inline-block';
                    loadLeaderboard();
                } else {
                    document.getElementById('profile-modal').style.display = 'flex';
                }
            } else {
                navInfo.innerText = "尚未登入";
                loginBtn.style.display = 'block';
            }
        });

        // 強制解套：如果 3 秒後還在「載入中」，直接顯示登入按鈕
        setTimeout(() => {
            if (document.getElementById('nav-info').innerText === "等待系統響應...") {
                document.getElementById('nav-info').innerText = "系統連線較慢，請嘗試登入";
                document.getElementById('login-btn').style.display = 'block';
            }
        }, 3000);

        // 儲存資料
        window.saveProfile = async () => {
            const nick = document.getElementById('p-nickname').value;
            const ig = document.getElementById('p-ig').value;
            if(!nick || !ig) return alert("要填完喔！");
            await setDoc(doc(db, "users", auth.currentUser.uid), { nickname: nick, ig, email: auth.currentUser.email });
            location.reload();
        };

        // 聊天
        window.sendChat = async () => {
            const text = document.getElementById('chat-input').value;
            if (!userProfile || !text) return alert("請先登入！");
            await addDoc(collection(db, "chats"), { nickname: userProfile.nickname, text, timestamp: Date.now(), uid: auth.currentUser.uid });
            document.getElementById('chat-input').value = "";
        };

        onSnapshot(query(collection(db, "chats"), orderBy("timestamp", "asc"), limit(30)), (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                const div = document.createElement('div');
                div.className = `chat-msg ${auth.currentUser && m.uid === auth.currentUser.uid ? 'msg-me' : 'msg-other'}`;
                div.innerHTML = `<small style="display:block; font-size:0.7rem; opacity:0.6;">${m.nickname}</small>${m.text}`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });

        function loadLeaderboard() {
            onSnapshot(collection(db, "users"), (snap) => {
                const list = document.getElementById('leaderboard-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const u = d.data();
                    const item = document.createElement('div');
                    item.style.padding = "10px";
                    item.style.borderBottom = "1px solid #eee";
                    item.innerHTML = `<strong>${u.nickname}</strong> <small style="color:#888">${u.ig}</small>`;
                    list.appendChild(item);
                });
            });
        }

    } catch (err) {
        alert("Firebase 初始化失敗，請檢查 Config 或網路！");
    }
</script>
</body>
</html>
