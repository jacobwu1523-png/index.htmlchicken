<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雞王粉絲互動系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">
        <header>
            <h1 class="calligraphy">雞</h1>
            <p>粉絲專屬即時對話</p>
        </header>

        <main id="chat-container">
            <div class="message fan-bubble">
                <span class="username">雞粉小明:</span>
                <p>這隻雞太霸氣了吧！</p>
            </div>

            <div class="message admin-bubble">
                <span class="username">Jacob Wu (Admin):</span>
                <p>歡迎來到我的地盤，保持禮貌。</p>
            </div>
        </main>

        <footer id="input-area">
            <input type="text" id="user-input" placeholder="說點什麼..." maxlength="200">
            <button id="send-btn">發送</button>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
