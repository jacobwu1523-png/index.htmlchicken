<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小雞手抄 | 專屬互動平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --chick: #ffde59; --ink: #2c2c2c; --paper: #fdfaf5; 
            /* 醉清風風格備援：馬善政、繁體楷體 */
            --calligraphy: "Ma Shan Zheng", "Zhi Mang Xing", "DFKai-SB", "標楷體", cursive;
            --standard: 'Noto Sans TC', sans-serif;
        }

        body { background: var(--paper); color: var(--ink); font-family: var(--standard); margin: 0; padding-bottom: 50px; display: flex; flex-direction: column; align-items: center; }
        header { background: var(--chick); width: 100%; padding: 40px 0; text-align: center; border-bottom: 5px solid var(--ink); margin-bottom: 20px; }
        
        /* 標題字體修正 */
        .main-title { font-family: var(--calligraphy); font-size: 5.5rem; margin: 0; font-weight: normal; line-height: 1; }

        .container { max-width: 550px; width: 92%; }
        .card { background: white; border: 3px solid var(--ink); border-radius: 16px; padding: 20px; margin-bottom: 25px; box-shadow: 8px 8px 0 var(--ink); }
        
        h2 { font-family: var(--calligraphy); font-size: 2.8rem; margin: 0 0 15px 0; border-bottom: 2px solid var(--chick); display: inline-block; }

        /* 導航欄 */
        #user-nav { background: #eee; padding: 12px; border-radius: 12px; margin-bottom: 20px; text-align: right; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }

        /* 聊天室 */
        #chat-box { height: 280px; overflow-y: auto; border: 2px solid #ddd; border-radius: 12px; padding: 15px; background: #fafafa; margin-bottom: 10px; display: flex; flex-direction: column; }
        .chat-msg { margin-bottom: 12px; padding: 10px; border-radius: 12px; max-width: 85%; line-height: 1.4; font-size: 0.95rem; }
        .msg-other { background: #e0e0e0; align-self: flex-start; }
        .msg-me { background: var(--chick); align-self: flex-end; }
        .msg-admin { background: var(--ink); color: white; align-self: flex-start; border: 2px solid var(--chick); }

        /* 輸入框與按鈕 */
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-family: var(--standard); font-size: 1rem; }
        .btn { background: var(--ink); color: white; padding: 14px; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1.1rem; }
        .btn-sm { width: auto; padding: 5px 12px; font-size: 0.8rem; margin-left: 5px; }

        /* 彈窗 */
        #profile-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 380px; text-align: center; border: 5px solid var(--ink); }
    </style>
</head>
<body>

<header>
    <div class="main-title">小雞手抄</div>
</header>

<div class="container">
    <div id="user-nav">
        <span id="nav-info">載入中...</span>
        <button id="logout-btn" class="btn btn-sm" style="display:none; background:#ff4d4d;">登出</button>
    </div>

    <section class="card">
        <h2>墨友排行</h2>
        <div id="leaderboard-list">讀取中...</div>
    </section>

    <section class="card">
        <h2>和小雞聊天</h2>
        <div id="chat-box"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="chat-input" placeholder="說點什麼...">
            <button class="btn btn-sm" onclick="sendChatMessage()" style="width:70px;">發送</button>
        </div>
    </section>

    <button id="login-btn" class="btn" style="background:white; color:var(--ink); border:3px solid var(--ink); display:none;">👤 Google 登入</button>
</div>

<div id="profile-modal">
    <div class="modal-content">
        <h2 style="font-size:2rem;">歡迎加入小雞手抄</h2>
        <input type="text" id="p-nickname" placeholder="想要顯示的暱稱">
        <input type="text" id="p-ig" placeholder="您的 IG (例: @jacob)">
        <button class="btn" onclick="saveProfile()">儲存並進入</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAOnZ6ZHMPS2S3-4C22IQetiIlSGV-OaEU",
        authDomain: "chicken-39494.firebaseapp.com",
        projectId: "chicken-39494",
        storageBucket: "chicken-39494.firebasestorage.app",
        messagingSenderId: "206297835176",
        appId: "1:206297835176:web:9d892561a92803f694049d",
        measurementId: "G-56LQM24TFM"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore();
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let userProfile = null;
    const ADMIN_EMAIL = "jacob.wu1523@gmail.com";

    // 改用重導向登入，避免 Vercel 彈窗錯誤
    document.getElementById('login-btn').onclick = () => signInWithRedirect(auth, provider);
    document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.reload());

    // 檢查重導向結果
    getRedirectResult(auth).catch(err => alert("登入錯誤：" + err.message));

    onAuthStateChanged(auth, async (user) => {
        const navInfo = document.getElementById('nav-info');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');

        if (user) {
            currentUser = user;
            const userSnap = await getDoc(doc(db, "users", user.uid));
            if (userSnap.exists()) {
                userProfile = userSnap.data();
                navInfo.innerText = `👋 ${userProfile.nickname}`;
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'inline-block';
            } else {
                document.getElementById('profile-modal').style.display = 'flex';
            }
        } else {
            navInfo.innerText = "尚未登入";
            loginBtn.style.display = 'block';
            logoutBtn.style.display = 'none';
        }
    });

    window.saveProfile = async () => {
        const nick = document.getElementById('p-nickname').value.trim();
        const ig = document.getElementById('p-ig').value.trim();
        if(!nick || !ig) return alert("請完整填寫喔！");
        await setDoc(doc(db, "users", currentUser.uid), { nickname: nick, ig: ig, email: currentUser.email });
        location.reload();
    };

    window.sendChatMessage = async () => {
        const text = document.getElementById('chat-input').value.trim();
        if (!userProfile || !text) return;
        await addDoc(collection(db, "chats"), { 
            nickname: userProfile.nickname, 
            email: currentUser.email, 
            text, 
            timestamp: Date.now() 
        });
        document.getElementById('chat-input').value = "";
    };

    onSnapshot(query(collection(db, "chats"), orderBy("timestamp", "asc"), limit(50)), (snap) => {
        const box = document.getElementById('chat-box');
        box.innerHTML = "";
        snap.forEach(d => {
            const m = d.data();
            const div = document.createElement('div');
            let type = (m.email === ADMIN_EMAIL) ? "msg-admin" : (currentUser && m.email === currentUser.email ? "msg-me" : "msg-other");
            div.className = `chat-msg ${type}`;
            div.innerHTML = `<small style="display:block; font-size:10px; opacity:0.6;">${m.nickname}</small>${m.text}`;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });

    onSnapshot(collection(db, "users"), (snap) => {
        const list = document.getElementById('leaderboard-list');
        list.innerHTML = "";
        snap.forEach(d => {
            const u = d.data();
            const div = document.createElement('div');
            div.style.padding = "10px";
            div.style.borderBottom = "1px solid #eee";
            div.innerHTML = `<strong>${u.nickname}</strong> <small style="color:#888">${u.ig}</small>`;
            list.appendChild(div);
        });
    });
</script>
</body>
</html>
